<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RoyalScan | 100% Fixed</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --glass: rgba(15, 1, 1, 0.95); --maroon: #2a0101; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; height: 100dvh; background: #000; color: white; overflow: hidden; }

        .bg-container { position: fixed; inset: 0; z-index: -2; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?q=80&w=2069') center/cover; }
        .heart { position: absolute; pointer-events: none; z-index: 1; animation: heartFall linear infinite; opacity: 0; }
        @keyframes heartFall { 0% { transform: translateY(-10dvh) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(110dvh) scale(1.5); opacity: 0; } }

        .page { display: none; height: 100dvh; width: 100%; padding: 20px; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; z-index: 10; }
        .page.active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--glass); border: 1.5px solid var(--gold); border-radius: 25px; padding: 30px 20px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        h1 { font-family: 'Cinzel'; color: var(--gold); margin: 0; font-size: 1.8rem; }
        .line { width: 40px; height: 2px; background: var(--gold); margin: 12px auto; }
        
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--gold); background: rgba(255,255,255,0.05); color: white; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; background: linear-gradient(45deg, #b8860b, #f7e08a); color: var(--maroon); margin-top: 8px; font-size: 0.9rem; }
        .btn-outline { background: transparent; border: 1.5px solid var(--gold); color: var(--gold); }

        /* QR DISPLAY FIX: This container will hold the QR as a real image element */
        #qr-container { background: white; padding: 15px; border-radius: 15px; margin: 15px auto; display: inline-block; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        #qr-container img { display: block; width: 200px; height: 200px; }

        #reader { width: 100% !important; border-radius: 15px; overflow: hidden; margin-bottom: 10px; }
        #grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-height: 40vh; overflow-y: auto; margin-top: 15px; }
        .thumb { border-radius: 8px; border: 1px solid var(--gold); overflow: hidden; }
        .thumb img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }

        #audio-toggle { position: fixed; top: 15px; right: 15px; z-index: 100; background: var(--gold); width: 42px; height: 42px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="event-audio" loop><source src="song.mp3" type="audio/mpeg"></audio>
    <div id="audio-toggle" onclick="toggleMusic()">🎵</div>
    <div class="bg-container"></div>
    <div id="heart-box"></div>

    <div id="login-p" class="page active">
        <div class="card">
            <h1>RoyalScan</h1>
            <div class="line"></div>
            <input type="text" id="l-user" placeholder="Username">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn" onclick="handleLogin()">Unlock Gallery</button>
            <p onclick="nav('sign-p')" style="margin-top:15px; font-size:0.8rem; cursor:pointer;">New? <u>Register</u></p>
            <div style="margin-top:15px; font-size:0.7rem; opacity:0.6;">Crafted by Kalpit Wakade</div>
        </div>
    </div>

    <div id="sign-p" class="page">
        <div class="card"><h1>Join</h1><input type="text" id="s-user" placeholder="User"><input type="password" id="s-pass" placeholder="Pass"><button class="btn" onclick="handleSignup()">Join</button></div>
    </div>

    <div id="home-p" class="page">
        <div class="card"><h1 id="greet">Welcome</h1><div class="line"></div>
        <button class="btn" onclick="nav('up-p')">Host: Upload</button>
        <button class="btn btn-outline" style="margin-top:15px;" onclick="nav('scan-p')">Guest: Scan</button>
        <p onclick="location.reload()" style="margin-top:25px; color:#ff4d4d; cursor:pointer;">LOGOUT</p></div>
    </div>

    <div id="up-p" class="page">
        <div class="card"><h1>Host</h1><div class="line"></div>
        <input type="file" id="f" multiple accept="image/*" hidden onchange="handleUpload(this)">
        <button class="btn" onclick="document.getElementById('f').click()">Select Photos</button>
        <p id="st" style="margin:10px 0; font-size:0.8rem; color:var(--gold);"></p>
        <button id="qr-btn" class="btn" style="display:none;" onclick="genQR()">Generate Access QR</button>
        <button class="btn btn-outline" onclick="nav('home-p')">Back</button></div>
    </div>

    <div id="qr-p" class="page">
        <div class="card">
            <h1>Event Access</h1>
            <div class="line"></div>
            
            <div id="qr-container"></div>
            
            <p style="font-size: 0.7rem; color: #d4af37; margin-bottom: 10px;">Long press on QR to save or click below</p>
            <button class="btn" onclick="saveQR()">Save QR as JPG</button>
            <button class="btn btn-outline" onclick="nav('home-p')">Done</button>
        </div>
    </div>

    <div id="scan-p" class="page">
        <div class="card"><h1>Scan</h1><div id="reader"></div><button class="btn" onclick="startCamera()">📸 Open Camera</button>
        <input type="file" id="qr-file" accept="image/*" hidden onchange="scanFile(this)">
        <button class="btn btn-outline" onclick="document.getElementById('qr-file').click()" style="margin-top:10px;">🖼️ Upload QR</button>
        <button class="btn btn-outline" onclick="nav('home-p')" style="margin-top:10px;">Back</button></div>
    </div>

    <div id="gal-p" class="page"><div class="card" style="max-width:95%; height:90dvh;"><h1>Gallery</h1><div id="grid"></div><button class="btn btn-outline" onclick="nav('home-p')" style="margin-top:15px;">Exit</button></div></div>

    <script>
        let db; let scanner; let musicOn = false;
        const req = indexedDB.open("RoyalScanVFinal", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("photos", { autoIncrement: true });
        req.onsuccess = e => db = e.target.result;

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'gal-p') loadGallery();
        }

        function toggleMusic() {
            const a = document.getElementById('event-audio');
            if(musicOn) a.pause(); else a.play().catch(e => console.log("Play blocked"));
            musicOn = !musicOn;
        }

        function handleLogin() {
            const u = document.getElementById('l-user').value;
            const p = document.getElementById('l-pass').value;
            if(localStorage.getItem(u) === p && u !== "") {
                document.getElementById('greet').innerText = "Namaste, " + u;
                document.getElementById('audio-toggle').style.display = "flex";
                if(!musicOn) toggleMusic();
                confetti({ particleCount: 80, spread: 50 }); nav('home-p');
            } else alert("Invalid!");
        }

        function handleSignup() {
            const u = document.getElementById('s-user').value;
            const p = document.getElementById('s-pass').value;
            if(u && p) { localStorage.setItem(u, p); alert("Registered!"); nav('login-p'); }
        }

        async function handleUpload(input) {
            const files = Array.from(input.files);
            const st = document.getElementById('st');
            for(let i=0; i<files.length; i++) {
                st.innerText = `Saving: ${i+1}/${files.length}`;
                const tx = db.transaction("photos", "readwrite");
                await tx.objectStore("photos").add(files[i]);
            }
            st.innerText = "✨ Success!"; document.getElementById('qr-btn').style.display = 'block';
        }

        // --- NEW NO-CANVAS QR LOGIC ---
        function genQR() {
            const container = document.getElementById('qr-container');
            container.innerHTML = ""; // Clear
            const url = window.location.href.split('#')[0] + "#event-access";
            
            // Generate QR - Library automatically creates an <img> tag inside
            new QRCode(container, {
                text: url,
                width: 256,
                height: 256,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            nav('qr-p');
        }

        function saveQR() {
            const qrImg = document.querySelector('#qr-container img');
            if(!qrImg) return alert("QR not ready");
            
            // Direct download link
            const a = document.createElement('a');
            a.href = qrImg.src;
            a.download = "RoyalScan_QR.jpg";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function startCamera() {
            document.getElementById('reader').style.display = 'block';
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => {
                if(txt.includes("event-access")) { scanner.stop(); nav('gal-p'); }
            });
        }

        function scanFile(input) {
            if(input.files[0]) {
                const s = new Html5Qrcode("reader");
                s.scanFile(input.files[0], true).then(txt => { if(txt.includes("event-access")) nav('gal-p'); });
            }
        }

        function loadGallery() {
            const grid = document.getElementById('grid'); grid.innerHTML = "";
            const tx = db.transaction("photos", "readonly");
            tx.objectStore("photos").openCursor().onsuccess = e => {
                const cursor = e.target.result;
                if(cursor) {
                    const url = URL.createObjectURL(cursor.value);
                    const div = document.createElement('div');
                    div.className = "thumb";
                    div.innerHTML = `<img src="${url}">`;
                    div.onclick = () => {
                        const a = document.createElement('a'); a.href = url;
                        a.download = `Photo_${Date.now()}.jpg`; a.click();
                    };
                    grid.appendChild(div); cursor.continue();
                }
            };
        }

        // Hearts Animation
        const hb = document.getElementById('heart-box');
        for(let i=0; i<30; i++) {
            const h = document.createElement('div'); h.className = 'heart';
            h.innerHTML = ['💝','✨','❤️','💕'][Math.floor(Math.random()*4)];
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random()*15 + 20) + 'px';
            h.style.animationDuration = (Math.random()*3 + 4) + 's';
            h.style.animationDelay = Math.random()*5 + 's';
            hb.appendChild(h);
        }
        window.onload = () => { if(window.location.hash === "#event-access") nav('login-p'); };
    </script>
</body>
</html>
